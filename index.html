        巨神诅咒我，风将我推离故乡。<br>
        塞壬使我沉沦，海吞没我的力量与心灵。<br>
        我在虚无中丧失意志，终于凋零。<br>
        死亡却使我复苏——<br>
        以光阴为筹码，用7年赎回爱恨；<br>
        流放思想，用21天回归心智。<br>
        我听见神谕，察觉命运已将我送至彼岸，仅需抬头。
